spring:
  jta:
    enabled: true

  datasource:
    xa:
      data-source-class-name: org.postgresql.xa.PGXADataSource
      properties:
        serverName: localhost
        portNumber: 5432
        databaseName: blps1
        user: postgres
        password: 1111

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        transaction:
          jta:
            platform: org.hibernate.engine.transaction.jta.platform.internal.AtomikosJtaPlatform

  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/blps1
    user: postgres
    password: 1111

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

    consumer:
      group-id: board-moderation-workers
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
minio:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: pins

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

server:
  port: 8080

security:
  xml-users-path: security-users.xml
  jwt:
    secret: "blps-lab-2-super-secret-key-for-jwt-generation-123456"
    expiration-minutes: 120

logging:
  level:
    com.atomikos: INFO
    org.springframework.transaction: DEBUG

bitrix24:
  webhook-url: ${BITRIX24_WEBHOOK_URL:}
  responsible-id: ${BITRIX24_RESPONSIBLE_ID:1}

app:
  outbox:
    publish-delay-ms: 5000
  kafka:
    consumer-enabled: true
    topics:
      board-moderation-requests: board-moderation-requests