spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/blps1
    username: postgres
    password: 1111
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

minio:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: pins

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

server:
  port: 8080

security:
  xml-users-path: security-users.xml
  jwt:
    secret: "blps-lab-2-super-secret-key-for-jwt-generation-123456"
    expiration-minutes: 120
